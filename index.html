<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영등포 AI(정보화)교육</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f0;
  --bg-tertiary: #eeede8;
  --text-primary: #1a1a18;
  --text-secondary: #6b6b68;
  --border: rgba(0,0,0,0.12);
  --border-md: rgba(0,0,0,0.22);
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --blue: #1a5fa8;
  --blue-light: #e6f1fb;
  --blue-dark: #0c447c;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c; --bg-secondary: #2a2a28; --bg-tertiary: #242422;
    --text-primary: #e8e8e4; --text-secondary: #9a9a96;
    --border: rgba(255,255,255,0.12); --border-md: rgba(255,255,255,0.22);
    --blue: #5fa3e0; --blue-light: #0c2a45; --blue-dark: #8bbde8;
  }
}
html, body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif; font-size:16px; font-weight:500; background:var(--bg-tertiary); color:var(--text-primary); }
body { min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:1.5rem 1rem 3rem; }
.wrap { width:100%; max-width:480px; display:flex; flex-direction:column; }
.header { background:#FE756D; color:#fff; border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:1.2rem 1.4rem 1rem; display:flex; align-items:center; gap:0.7rem; }
.header-icon { width:40px; height:40px; background:rgba(255,255,255,0.18); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.header-text h1 { margin:0; font-size:17px; font-weight:700; }
.header-text p { margin:2px 0 0; font-size:14px; opacity:0.85; }
.chat-box { background:var(--bg-primary); padding:1rem; display:flex; flex-direction:column; gap:0.75rem; min-height:420px; max-height:62vh; overflow-y:auto; }
.bot-row { display:flex; align-items:flex-start; gap:0.5rem; }
.bot-avatar { width:30px; height:30px; background:var(--blue-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--blue); flex-shrink:0; margin-top:2px; }
.bubble { padding:0.6rem 0.9rem; border-radius:var(--radius-lg); line-height:1.6; font-size:15px; font-weight:500; max-width:90%; }
.bubble.bot { background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-primary); border-radius:4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
.bubble.user { background:var(--blue); color:#fff; border-radius:var(--radius-lg) 4px var(--radius-lg) var(--radius-lg); margin-left:auto; }
.user-row { display:flex; justify-content:flex-end; }
.options-row { display:flex; flex-wrap:wrap; gap:0.45rem; padding:0.4rem 0 0.2rem; }
.options-row.center { justify-content:center; }
.timetable-btn { width:100%; background:var(--blue-light); border:1.5px solid var(--blue); color:var(--blue); border-radius:10px; padding:0.55rem 1rem; font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.15s; text-align:center; }
.timetable-btn:hover { background:var(--blue); color:#fff; }
.tt-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:9999; align-items:center; justify-content:center; padding:1rem; }
.tt-modal.open { display:flex; }
.tt-modal img { max-width:100%; max-height:90vh; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,0.5); }
.tt-close { position:fixed; top:1rem; right:1rem; background:#fff; border:none; border-radius:50%; width:36px; height:36px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.opt-btn { background:var(--bg-primary); border:1.5px solid var(--blue); color:var(--blue); border-radius:20px; padding:0.38rem 0.85rem; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap; }
.opt-btn:hover { background:var(--blue); color:#fff; }
.input-row { display:flex; gap:0.5rem; padding:0.4rem 0 0.2rem; }
.input-row input { flex:1; border:1.5px solid var(--border-md); border-radius:var(--radius-md); padding:0.5rem 0.75rem; font-size:15px; font-weight:500; font-family:inherit; background:var(--bg-primary); color:var(--text-primary); outline:none; }
.input-row input:focus { border-color:var(--blue); }
.input-row button { background:var(--blue); color:#fff; border:none; border-radius:var(--radius-md); padding:0.5rem 1rem; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; }
.course-card { background:var(--bg-primary); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:var(--radius-md); padding:0.65rem 0.85rem; margin:0.35rem 0; }
.course-card .c-name { font-weight:700; font-size:14.5px; margin-bottom:3px; }
.course-card .c-badge { display:inline-block; background:var(--blue-light); color:var(--blue); border-radius:10px; font-size:11px; padding:1px 8px; margin-bottom:4px; }
.course-card .c-info { font-size:13px; font-weight:500; color:var(--text-secondary); line-height:1.6; }
.course-card .c-desc { font-size:13.5px; font-weight:500; color:var(--text-primary); margin-top:5px; line-height:1.5; border-top:1px solid var(--border); padding-top:5px; }
.hotline { display:none; background:var(--bg-secondary); border-top:1px solid var(--border); border-radius:0 0 var(--radius-xl) var(--radius-xl); padding:0.75rem 1rem; flex-direction:column; gap:0.4rem; }
.hotline-row { display:flex; align-items:center; gap:0.5rem; font-size:14px; font-weight:500; color:var(--text-secondary); }
.hotline-row a { color:var(--blue); text-decoration:none; font-weight:600; }
.hotline-row a:hover { text-decoration:underline; }
.reset-btn { display:none; background:var(--blue); border:none; border-radius:20px; padding:0.45rem 1.2rem; font-size:13px; font-weight:700; color:#fff; cursor:pointer; font-family:inherit; margin-top:6px; box-shadow:0 2px 6px rgba(26,95,168,0.35); transition:all 0.15s; }
.reset-btn:hover { background:var(--blue-dark); box-shadow:0 4px 10px rgba(26,95,168,0.45); transform:translateY(-1px); }
.qr-wrap { display:flex; gap:0.6rem; margin-top:0.3rem; }
.qr-card { flex:1; display:flex; flex-direction:column; align-items:center; gap:0.35rem; background:var(--bg-primary); border:1.5px solid var(--blue); border-radius:var(--radius-md); padding:0.7rem 0.5rem; text-decoration:none; transition:all 0.15s; }
.qr-card:hover { background:var(--blue-light); transform:translateY(-2px); }
.qr-card img { width:100%; max-width:130px; aspect-ratio:1; border-radius:4px; display:block; }
.qr-title { font-weight:700; font-size:14px; color:var(--blue); }
.qr-sub { font-size:12px; font-weight:500; color:var(--text-secondary); text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-icon"><i class="ti ti-school"></i></div>
    <div class="header-text">
      <h1>영등포 AI(정보화)교육</h1>
      <p>나에게 맞는 강좌를 찾아드려요 😊</p>
    </div>
  </div>
  <div class="chat-box" id="chat"></div>
  <div class="hotline" id="hotline">
    <div class="hotline-row"><i class="ti ti-world" style="font-size:15px"></i>
      <span>교육접수: <a href="http://www.ydp.go.kr" target="_blank">영등포구 홈페이지</a> → 통합예약 → AI(정보화)교육</span>
    </div>
    <div class="hotline-row"><i class="ti ti-phone" style="font-size:15px"></i>
      <span>통합 콜센터: <a href="tel:02-2670-4051">☎ 02-2670-4051</a></span>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:4px;">
      <button class="timetable-btn" onclick="showTT('7')">📅 7월 AI교육 시간표</button>
      <button class="timetable-btn" onclick="showTT('8')">📅 8월 AI교육 시간표</button>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="reset()">↩ 처음부터 다시</button>
  </div>
</div>

<!-- 시간표 모달 -->
<div class="tt-modal" id="ttModal" onclick="closeTT()">
  <button class="tt-close" onclick="closeTT()">✕</button>
  <img id="ttImg" src="" alt="AI교육 시간표">
</div>

// ── 분야 키워드 매핑 ──
function getFields(input) {
  const v = input.toLowerCase().replace(/\s/g,'');
  const fields = [];
  if (/컴퓨터|pc|윈도우|한글|워드|문서|타자|키보드/.test(v)) fields.push('컴퓨터');
  if (/엑셀|excel|스프레드|시트/.test(v)) fields.push('컴퓨터','엑셀');
  if (/파워포인트|ppt|프레젠테이션|발표|슬라이드/.test(v)) fields.push('컴퓨터','프레젠테이션');
  if (/스마트폰|휴대폰|카카오|핸드폰|모바일|키오스크/.test(v)) fields.push('스마트폰');
  if (/ai|인공지능|챗gpt|chatgpt|제미나이|gemini|생성형|클로드|claude/.test(v)) fields.push('AI');
  if (/영상|동영상|유튜브|쇼츠|릴스|틱톡|편집|영화|캡컷|키네마스터|브루|vrew/.test(v)) fields.push('영상');
  if (/블로그|인스타|sns|페이스북|네이버블로그/.test(v)) fields.push('영상','AI');
  if (/음악|노래|작곡|수노|suno|뮤직/.test(v)) fields.push('음악');
  if (/이미지|사진|그림|포토|디자인|캔바|미리캔버스|포토샵/.test(v)) fields.push('이미지');
  if (/자격증|itq|자격/.test(v)) fields.push('자격증');
  if (fields.length === 0) fields.push('AI','컴퓨터','스마트폰');
  return [...new Set(fields)];
}

function addBot(html, delay=500) {
  return new Promise(res => {
    setTimeout(() => {
      const chat = document.getElementById('chat');
      const row = document.createElement('div');
      row.className = 'bot-row';
      row.innerHTML = `<div class="bot-avatar"><i class="ti ti-robot"></i></div><div class="bubble bot">${html}</div>`;
      chat.appendChild(row);
      row.scrollIntoView({behavior:'smooth',block:'nearest'});
      res();
    }, delay);
  });
}
function addUser(text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'user-row';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  chat.appendChild(row);
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function clearControls() {
  ['opts','inp'].forEach(id => { const el = document.getElementById(id); if(el) el.remove(); });
}
function addOptions(opts, onSelect, centered=false) {
  clearControls();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'options-row' + (centered ? ' center' : ''); row.id = 'opts';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt-btn'; b.textContent = o;
    b.onclick = () => { clearControls(); onSelect(o); };
    row.appendChild(b);
  });
  chat.appendChild(row);
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function addInput(placeholder, onSubmit) {
  clearControls();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'input-row'; row.id = 'inp';
  const input = document.createElement('input');
  input.type = 'text'; input.placeholder = placeholder;
  const btn = document.createElement('button');
  btn.textContent = '확인';
  btn.onclick = () => { const v = input.value.trim(); if(!v) return; clearControls(); onSubmit(v); };
  input.onkeydown = e => { if(e.key==='Enter') btn.click(); };
  row.appendChild(input); row.appendChild(btn);
  chat.appendChild(row);
  input.focus();
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function starsToText(s) {
  if(s==='★') return '초급★';
  if(s==='★★') return '중급★★';
  if(s==='★★★') return '중급★★★';
  if(s==='★★★★') return '심화★★★★';
  return s||'';
}

}

  if (fields.includes('이미지')) return '이미지';
  if (fields.includes('스마트폰')) return '스마트폰';
  if (fields.includes('컴퓨터')) return '컴퓨터';
  return '컴퓨터'; // 기본값
}

function doQuiz(field, idx) {
  // AI 분야는 별도 흐름(경험 → 목적)
  if (field === 'AI') { aiExperienceStep(); return; }

  const qs = QUIZ[field] || [];
  if (idx >= qs.length) { showResult(); return; }
  const q = qs[idx];
  setTimeout(() => {
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'bot-row';
    row.innerHTML = `<div class="bot-avatar"><i class="ti ti-robot"></i></div><div class="bubble bot">${q.q}</div>`;
    chat.appendChild(row);
    row.scrollIntoView({behavior:'smooth',block:'nearest'});
    addOptions(q.opts.map(o => o[0]), (ans) => {
      addUser(ans);
      const sc = q.opts.find(o => o[0] === ans)[1];
      state.answers.push(sc);
      doQuiz(field, idx+1);
    });
  }, 400);
}

// ── AI 분야 전용: 1) 사용 경험 ──
function aiExperienceStep() {
  setTimeout(() => {
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'bot-row';
    row.innerHTML = `<div class="bot-avatar"><i class="ti ti-robot"></i></div><div class="bubble bot">AI 서비스(ChatGPT, 제미나이 등)를 사용해 보신 적 있나요?</div>`;
    chat.appendChild(row);
    row.scrollIntoView({behavior:'smooth',block:'nearest'});
    const opts = [['들어봤지만 써본 적 없음',0],['한두 번 써봤음',1],['자주 사용함',2],['업무에도 활용 중',3]];
    addOptions(opts.map(o=>o[0]), (ans) => {
      addUser(ans);
      state.answers.push(opts.find(o=>o[0]===ans)[1]);
      aiPurposeStep();
    });
  }, 400);
}

// ── AI 분야 전용: 2) 하고 싶은 것 (기타 직접입력 포함) ──
function aiPurposeStep() {
  setTimeout(async () => {
    await addBot('AI로 주로 하고 싶은 것이 무엇인가요?', 200);
    const purposes = [
      ['일상 검색·요약·글쓰기', ['AI']],
      ['이미지·영상 만들기', ['이미지','영상','AI']],
      ['업무 자동화·문서 작성', ['컴퓨터','AI']],
      ['유튜브·블로그 콘텐츠 제작', ['영상','AI']],
      ['✏️ 기타 (직접 입력)', null],
    ];
    addOptions(purposes.map(p=>p[0]), (ans) => {
      addUser(ans);
      if (ans.includes('기타')) {
        addInput('하고 싶은 것을 입력해 주세요 (예: 음악 만들기)', (txt) => {
          addUser(txt);
          // 직접 입력은 키워드로 분야 보강
          const extra = getFields(txt);
          state.interestFields = [...new Set([...state.interestFields, ...extra])];
          showResult();
        });
      } else {
        const sel = purposes.find(p=>p[0]===ans);
        state.interestFields = [...new Set([...state.interestFields, ...sel[1]])];
        showResult();
      }
    });
  }, 300);
}

async function showResult() {
  // 답변 점수 평균 → 레벨 0~3 정규화
  const total = state.answers.reduce((a,b)=>a+b,0);
  const avg = state.answers.length ? total / state.answers.length : 0;
  let level;
  if (avg < 0.6) level = 0;
  else if (avg < 1.3) level = 1;
  else if (avg < 2.1) level = 2;
  else level = 3;
  state.level = level;

  const levelMsg =
    level === 0 ? '완전 기초부터 차근차근 시작하시면 좋겠습니다 😊<br>걱정 마세요, 기초부터 도와드릴게요!' :
    level === 1 ? '기초는 어느 정도 되시니 입문·활용 과정으로 가셔도 좋습니다! 👍' :
    level === 2 ? '기본은 익숙하시니 중급·실습형이 잘 맞으실 것 같습니다! 💪' :
    '활용 경험이 많으시니 심화·실무 과정에 도전해 보셔도 좋겠습니다! 🚀';

  // ── 강좌별 적합도 점수 계산 (분야 우선, 레벨은 페널티) ──
  const monthOk = c => TARGET_MONTHS.some(m => c.month.includes(m.replace('월','')));
  const fieldMatchCount = c => state.interestFields.filter(f => c.field.includes(f)).length;

  let scored = COURSES
    .filter(c => monthOk(c) && fieldMatchCount(c) > 0)   // 7·8월 + 분야 일치 강좌
    .map(c => {
      const fieldScore = fieldMatchCount(c) * 10;         // 분야 많이 맞을수록 가산
      const levelPenalty = Math.abs(c.level - level) * 3; // 레벨 차이는 감점
      return { c, score: fieldScore - levelPenalty };
    })
    .sort((a, b) => b.score - a.score);

  // 센터가 한쪽으로 쏠리지 않게: 같은 센터 최대 2개까지
  const picks = [];
  const centerCount = {};
  for (const { c } of scored) {
    const key = c.center.replace(/\d.*$/, '');           // 강의실 번호 무시하고 센터 단위
    if ((centerCount[key] || 0) >= 2) continue;
    picks.push(c);
    centerCount[key] = (centerCount[key] || 0) + 1;
    if (picks.length >= 3) break;
  }
  // 위 규칙으로 너무 적게 뽑히면 점수순으로 보충
  if (picks.length < 2) {
    for (const { c } of scored) {
      if (!picks.includes(c)) picks.push(c);
      if (picks.length >= 3) break;
    }
  }

  let html = `${levelMsg}<br><br><strong>📋 7·8월 추천 강좌입니다 👇</strong>`;
  if (picks.length > 0) {
    picks.forEach(c => html += renderCard(c));
  } else {
    html += `<div style="margin-top:8px;padding:10px;background:var(--bg-secondary);border-radius:8px;font-size:13px">
      말씀하신 분야와 딱 맞는 7·8월 강좌를 찾지 못했어요.<br>
      비슷한 과정 안내는 <strong>☎ 02-2670-4051</strong>로 문의해 주세요.
    </div>`;
  }
  html += `<div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">📌 접수: 영등포구 홈페이지 → 통합예약 → AI(정보화)교육 | 신분증 필수 지참</div>`;

  await addBot(html, 800);
  document.getElementById('hotline').style.display = 'flex';
  document.getElementById('resetBtn').style.display = 'inline-block';

  addOptions(['접수 방법 알려주세요', '수강료 알려주세요'], async (ans) => {
    addUser(ans);
    if (ans.includes('접수')) {
      await addBot(`📝 <strong>신청방법</strong><br><br>
        ① 영등포구 홈페이지(<a href="http://www.ydp.go.kr" target="_blank">www.ydp.go.kr</a>)<br>
        &nbsp;&nbsp;&nbsp;▶ 통합예약 ▶ AI(정보화)교육<br>
        &nbsp;&nbsp;&nbsp;<span style="font-size:12px;color:var(--text-secondary)">※ 홈페이지 회원가입 필수</span><br>
        ② 전화접수: <a href="tel:02-2670-4051"><strong>02-2670-4051</strong></a><br><br>
        📅 <strong>7월 강좌 접수:</strong> 6/15~6/18 (추가 6/22~6/25)<br>
        📅 <strong>8월 강좌 접수:</strong> 7/20~7/23 (추가 7/27~7/30)<br>
        ✅ 신분증 필수 지참 · 정규 1개 + 특강 1개 신청 가능<br><br>
        아래에서 바로 연결하실 수 있어요 👇`);
      addQRCards();
    } else if (ans.includes('수강료')) {
      await addBot(`💰 <strong>수강료 안내</strong><br><br>
        <strong>✅ 완전 무료 (면제 대상)</strong><br>
        · 55세 이상 영등포구민<br>
        · 장애인 / 국가유공자<br>
        · 기초생활수급자 / 결혼이민자<br><br>
        <strong>💳 유료 (영등포구민)</strong><br>
        · 정규 16시간 이상: 월 <strong>10,000원</strong><br>
        · 그 외(특강 등): 월 <strong>5,000원</strong><br><br>
        문의: <strong>☎ 02-2670-4051</strong>`);
      addOptions(['📝 접수 방법 알려주세요'], async (ans2) => {
        addUser(ans2);
        await addBot(`📝 <strong>신청방법</strong><br><br>
          ① 영등포구 홈페이지(<a href="http://www.ydp.go.kr" target="_blank">www.ydp.go.kr</a>)<br>
          &nbsp;&nbsp;&nbsp;▶ 통합예약 ▶ AI(정보화)교육<br>
          &nbsp;&nbsp;&nbsp;<span style="font-size:12px;color:var(--text-secondary)">※ 홈페이지 회원가입 필수</span><br>
          ② 전화접수: <a href="tel:02-2670-4051"><strong>02-2670-4051</strong></a><br><br>
          📅 <strong>7월 강좌 접수:</strong> 6/15~6/18 (추가 6/22~6/25)<br>
          📅 <strong>8월 강좌 접수:</strong> 7/20~7/23 (추가 7/27~7/30)<br>
          ✅ 신분증 필수 지참 · 정규 1개 + 특강 1개 신청 가능<br><br>
          아래에서 바로 연결하실 수 있어요 👇`);
        addQRCards();
      });
    }
  }, true);
}

function showTT(month) {

}
function closeTT() {
  document.getElementById('ttModal').classList.remove('open');
}

function reset() {
  document.getElementById('chat').innerHTML = '';
  document.getElementById('hotline').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
